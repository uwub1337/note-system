<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>筆記管理系統</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <!-- 左側工作台：提供篩選、新增、主題切換與匯出功能。 -->
      <section id="appView" class="workspace" aria-label="筆記管理工作區">
        <aside class="sidebar">
          <div class="brand-row">
            <div>
              <p class="eyebrow">Local Notes</p>
              <h2>筆記工作台</h2>
            </div>
            <button id="sidebarCollapseBtn" class="ghost-button icon-button collapse-button" type="button" title="收合工作台" aria-label="收合工作台">‹</button>
          </div>

          <div class="collapsible-content">
            <button id="newNoteBtn" class="primary-button" type="button">+ 新增筆記</button>

            <div class="filter-stack">
              <label for="searchInput">搜尋筆記</label>
              <input id="searchInput" type="search" placeholder="搜尋標題或內容" />

              <label for="categoryFilter">分類篩選</label>
              <select id="categoryFilter">
                <option value="all">全部分類</option>
              </select>

              <label for="statusFilter">快速篩選</label>
              <select id="statusFilter">
                <option value="all">全部筆記</option>
                <option value="favorite">收藏筆記</option>
                <option value="pinned">置頂筆記</option>
              </select>
            </div>

            <div class="stats-grid">
              <div>
                <span id="totalCount">0</span>
                <small>總筆記</small>
              </div>
              <div>
                <span id="favoriteCount">0</span>
                <small>收藏</small>
              </div>
            </div>

            <div class="utility-row">
              <button id="themeToggleBtn" class="theme-toggle" type="button" aria-label="切換主題">
                <span id="themeIcon" class="theme-icon" aria-hidden="true">☀</span>
                <span id="themeText" class="theme-text">淺色模式</span>
              </button>
              <button id="exportBtn" class="ghost-button" type="button">匯出筆記</button>
            </div>
          </div>
        </aside>

        <!-- 中間區塊：顯示可搜尋的筆記列表與展示資料重置。 -->
        <section class="note-list-panel" aria-labelledby="listTitle">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Notes</p>
              <h2 id="listTitle">筆記列表</h2>
            </div>
            <div class="panel-actions">
              <button id="seedBtn" class="ghost-button" type="button">重置展示資料</button>
            </div>
          </div>
          <div class="collapsible-content">
            <div id="noteList" class="note-list"></div>
            <div id="emptyState" class="empty-state is-hidden">
              <h3>目前沒有符合條件的筆記</h3>
              <p>可以新增一筆，或調整搜尋與分類條件。</p>
            </div>
          </div>
        </section>

        <!-- 右側編輯器：提供富文字編輯、自動儲存與格式工具。 -->
        <section class="editor-panel" aria-labelledby="editorTitle">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Editor</p>
              <h2 id="editorTitle">編輯筆記</h2>
            </div>
            <div class="editor-head-actions">
              <span id="saveStatus" class="save-status">尚未儲存</span>
              <button id="aiSummaryBtn" class="ghost-button" type="button">AI 摘要</button>
              <button id="fullscreenBtn" class="ghost-button icon-button" type="button" title="全螢幕" aria-label="全螢幕">⛶</button>
            </div>
          </div>

          <div class="toolbar-group compact-history" aria-label="編輯工具">
            <button id="undoBtn" class="ghost-button icon-button" type="button" title="上一步" aria-label="上一步">↶</button>
            <button id="redoBtn" class="ghost-button icon-button" type="button" title="下一步" aria-label="下一步">↷</button>
          </div>

          <form id="noteForm" class="note-form" action="#">
            <input id="noteId" type="hidden" />

            <label for="noteTitle">標題 <span>*</span></label>
            <input id="noteTitle" type="text" placeholder="輸入筆記標題" required />
            <p id="titleError" class="field-error is-hidden">標題不可空白。</p>

            <label for="noteCategory">分類</label>
            <input id="noteCategory" type="text" list="categoryOptions" placeholder="例如：課程、專案、生活" />
            <datalist id="categoryOptions"></datalist>

            <label for="noteTags">標籤</label>
            <input id="noteTags" type="text" placeholder="用逗號分隔，例如：JavaScript, 期末" />
            <div id="tagPreview" class="tag-preview"></div>

            <label for="noteContent">內容</label>
            <div
              id="noteContent"
              class="rich-editor"
              contenteditable="true"
              role="textbox"
              aria-multiline="true"
              data-placeholder="寫下重點、待辦或課堂筆記"
            ></div>

            <div class="toggle-row">
              <label class="check-label">
                <input id="noteFavorite" type="checkbox" />
                收藏
              </label>
              <label class="check-label">
                <input id="notePinned" type="checkbox" />
                置頂
              </label>
            </div>

            <div class="toggle-row color-row">
              <span class="toolbar-label">螢光筆</span>
              <div class="toolbar-group">
                <button class="highlight-swatch yellow" data-highlight="yellow" type="button" title="黃色螢光筆"></button>
                <button class="highlight-swatch green" data-highlight="green" type="button" title="綠色螢光筆"></button>
                <button class="highlight-swatch teal" data-highlight="teal" type="button" title="青色螢光筆"></button>
                <button class="highlight-swatch blue" data-highlight="blue" type="button" title="藍色螢光筆"></button>
                <button class="highlight-swatch purple" data-highlight="purple" type="button" title="紫色螢光筆"></button>
                <button class="highlight-swatch pink" data-highlight="pink" type="button" title="粉色螢光筆"></button>
                <button class="highlight-swatch red" data-highlight="red" type="button" title="紅色螢光筆"></button>
                <button class="highlight-swatch orange" data-highlight="orange" type="button" title="橘色螢光筆"></button>
                <button class="highlight-swatch gray" data-highlight="gray" type="button" title="灰色螢光筆"></button>
                <button class="highlight-swatch black" data-highlight="black" type="button" title="黑色螢光筆"></button>
                <button class="highlight-swatch white" data-highlight="white" type="button" title="白色螢光筆"></button>
              </div>
              <span class="toolbar-label">字色</span>
              <div class="toolbar-group">
                <button class="color-swatch red" data-text-color="red" type="button" title="紅色文字"></button>
                <button class="color-swatch orange" data-text-color="orange" type="button" title="橘色文字"></button>
                <button class="color-swatch yellow" data-text-color="yellow" type="button" title="黃色文字"></button>
                <button class="color-swatch green" data-text-color="green" type="button" title="綠色文字"></button>
                <button class="color-swatch teal" data-text-color="teal" type="button" title="青色文字"></button>
                <button class="color-swatch blue" data-text-color="blue" type="button" title="藍色文字"></button>
                <button class="color-swatch purple" data-text-color="purple" type="button" title="紫色文字"></button>
                <button class="color-swatch pink" data-text-color="pink" type="button" title="粉色文字"></button>
                <button class="color-swatch gray" data-text-color="gray" type="button" title="灰色文字"></button>
                <button class="color-swatch black" data-text-color="black" type="button" title="黑色文字"></button>
                <button class="color-swatch white" data-text-color="white" type="button" title="白色文字"></button>
              </div>
              <span class="toolbar-label">格式</span>
              <div class="toolbar-group">
                <button class="format-button" data-format="bold" type="button" title="粗體" aria-label="粗體"><strong>B</strong></button>
                <button class="format-button" data-format="italic" type="button" title="斜體" aria-label="斜體"><em>I</em></button>
                <button class="format-button" data-format="strike" type="button" title="刪除線" aria-label="刪除線"><s>S</s></button>
              </div>
            </div>

            <div class="action-row">
              <button id="deleteBtn" class="danger-button" type="button">刪除</button>
              <button id="clearFormBtn" class="ghost-button" type="button">清空</button>
            </div>
          </form>
        </section>

        <section id="summaryPanel" class="summary-panel is-hidden" aria-labelledby="summaryTitle" aria-modal="true" role="dialog">
          <div class="summary-card">
            <div class="panel-head">
              <div>
                <p class="eyebrow">AI Summary</p>
                <h2 id="summaryTitle">AI 摘要筆記</h2>
              </div>
              <button id="summaryCloseBtn" class="ghost-button icon-button" type="button" title="關閉" aria-label="關閉">×</button>
            </div>

            <div class="summary-body">
              <p class="summary-hint">選擇要摘要的筆記。若右側正在編輯某篇筆記，會自動先勾選它。</p>
              <div id="summaryNotePicker" class="summary-note-picker"></div>
              <p id="summaryError" class="field-error is-hidden">請選擇筆記。</p>

              <div class="action-row">
                <button id="summaryRunBtn" class="primary-button" type="button">產生摘要</button>
                <button id="summarySelectCurrentBtn" class="ghost-button" type="button">選目前筆記</button>
              </div>

              <label for="summaryOutput">摘要結果</label>
              <div id="summaryOutput" class="summary-output markdown-output" role="region" aria-live="polite">
                AI 摘要會顯示在這裡
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>

  <script src="./app.js"></script>
  <script src="./summary-rerun.js"></script>
</body>
</html>
